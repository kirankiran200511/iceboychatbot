<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Ice-boy Support Chat</title>
	<style>
		:root {
			--primary: #2563eb;
			--primary-dark: #1d4ed8;
			--primary-darker: #1e40af;
			--white: #fff;
			--bg: #f9fafb;
			--border: #e5e7eb;
			--border-dark: #d1d5db;
			--text: #374151;
			--text-muted: #6b7280;
			--text-light: #9ca3af;
			--font: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		html, body {
			height: 100%;
			width: 100%;
			overflow: hidden;
			font-family: var(--font);
			background: var(--white);
		}

		/* ═══ FULL PAGE CHAT ═══ */
		#chat-window {
			display: flex;
			flex-direction: column;
			height: 100vh;
			height: 100dvh;
			width: 100%;
			background: var(--white);
		}

		/* Header */
		.chat-header {
			background: var(--primary);
			padding: 1.125rem 1.375rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-shrink: 0;
		}
		.chat-header-left { display: flex; align-items: center; gap: 10px; }
		.header-avatar {
			width: 40px; height: 40px;
			border-radius: 50%;
			background: rgba(255,255,255,0.18);
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
		}
		.header-info .title {
			color: #fff;
			font-size: 1.0625rem;
			font-weight: 600;
			line-height: 1.3;
		}

		/* Messages Body */
		.chat-body {
			flex: 1;
			overflow-y: auto;
			padding: 1.25rem;
			background: var(--bg);
			display: flex;
			flex-direction: column;
			gap: 0;
			scroll-behavior: smooth;
		}
		.chat-body::-webkit-scrollbar { width: 4px; }
		.chat-body::-webkit-scrollbar-track { background: transparent; }
		.chat-body::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 4px; }

		/* Message Rows */
		.msg-row {
			display: flex;
			align-items: flex-end;
			gap: 8px;
			margin-bottom: 0.625rem;
			animation: msgIn 0.22s cubic-bezier(0.34,1.36,0.64,1) both;
		}
		@keyframes msgIn {
			from { opacity: 0; transform: translateY(10px); }
			to { opacity: 1; transform: translateY(0); }
		}
		.msg-row.bot { justify-content: flex-start; }
		.msg-row.user { justify-content: flex-end; }

		.msg-avatar {
			width: 28px; height: 28px;
			border-radius: 50%;
			background: var(--primary);
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
		}

		.msg-col { display: flex; flex-direction: column; max-width: 78%; }
		.bot .msg-col { align-items: flex-start; }
		.user .msg-col { align-items: flex-end; }

		.bubble {
			padding: 0.8125rem 0.9375rem;
			border-radius: 0.75rem;
			font-size: 0.9375rem;
			line-height: 1.55;
			word-break: break-word;
		}
		.bot .bubble {
			background: var(--white);
			color: var(--text);
			border: 1px solid var(--border);
			border-bottom-left-radius: 4px;
			white-space: pre-wrap;
		}
		.bot .bubble a { color: var(--primary); text-decoration: underline; word-break: break-all; }
		.bot .bubble a:hover { color: var(--primary-dark); }
		.user .bubble {
			background: var(--primary);
			color: #fff;
			border-bottom-right-radius: 4px;
		}

		/* Typing Indicator */
		.typing-bubble {
			background: var(--white);
			border: 1px solid var(--border);
			padding: 0.875rem 1rem;
			border-radius: 0.75rem;
			border-bottom-left-radius: 4px;
			display: flex;
			gap: 4px;
		}
		.typing-dot {
			width: 7px; height: 7px;
			border-radius: 50%;
			background: var(--text-muted);
			animation: bounce 1.1s infinite ease-in-out;
		}
		.typing-dot:nth-child(2) { animation-delay: 0.18s; }
		.typing-dot:nth-child(3) { animation-delay: 0.36s; }
		@keyframes bounce {
			0%, 60%, 100% { transform: translateY(0); }
			30% { transform: translateY(-5px); }
		}

		/* Footer / Input */
		.chat-footer {
			background: var(--white);
			padding: 0.75rem 1rem 0.875rem;
			flex-shrink: 0;
			border-top: 1px solid #f0f0f0;
			padding-bottom: max(0.875rem, env(safe-area-inset-bottom));
		}
		.footer-powered {
			text-align: center;
			font-size: 0.6875rem;
			color: var(--text-light);
			margin-bottom: 0.5rem;
		}
		.input-wrap {
			display: flex;
			align-items: flex-end;
			gap: 6px;
			background: var(--bg);
			border: 1px solid var(--border);
			border-radius: 1.5rem;
			padding: 0.45rem 0.625rem;
			transition: border-color 0.15s;
		}
		.input-wrap:focus-within { border-color: var(--primary); }

		#chat-textarea {
			flex: 1;
			border: none;
			background: transparent;
			font-size: 0.9375rem;
			font-family: var(--font);
			color: var(--text);
			outline: none;
			resize: none;
			min-height: 22px;
			max-height: 120px;
			line-height: 1.5;
			padding: 3px 0;
		}
		#chat-textarea::placeholder { color: var(--text-light); }

		.btn-send {
			background: var(--primary);
			border: none;
			cursor: pointer;
			color: #fff;
			width: 42px; height: 42px;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
			transition: all 0.15s;
		}
		.btn-send:hover { background: var(--primary-dark); }
		.btn-send:active { transform: scale(0.93); }
		.btn-send:disabled { background: #93c5fd; cursor: not-allowed; }
	</style>
</head>
<body>

<div id="chat-window" role="dialog" aria-label="Ice-boy Support Chat">

	<!-- Header -->
	<div class="chat-header">
		<div class="chat-header-left">
			<div class="header-avatar">
				<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<line x1="12" y1="2" x2="12" y2="22"/>
					<line x1="2" y1="12" x2="22" y2="12"/>
					<line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
					<line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/>
					<line x1="12" y1="2" x2="9" y2="5"/><line x1="12" y1="2" x2="15" y2="5"/>
					<line x1="12" y1="22" x2="9" y2="19"/><line x1="12" y1="22" x2="15" y2="19"/>
					<line x1="2" y1="12" x2="5" y2="9"/><line x1="2" y1="12" x2="5" y2="15"/>
					<line x1="22" y1="12" x2="19" y2="9"/><line x1="22" y1="12" x2="19" y2="15"/>
				</svg>
			</div>
			<div class="header-info">
				<div class="title">Ice-boy Support</div>
			</div>
		</div>
	</div>

	<!-- Messages -->
	<div class="chat-body" id="chat-body"></div>

	<!-- Footer -->
	<div class="chat-footer">
		<div class="footer-powered">Powered by Ice-boy AI Assistant &bull; 33+ Years of Excellence</div>
		<div class="input-wrap">
			<textarea id="chat-textarea" rows="1" placeholder="Type your message..." aria-label="Message input"></textarea>
			<button class="btn-send" id="btn-send" title="Send" aria-label="Send message">
				<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
					<line x1="22" y1="2" x2="11" y2="13"/>
					<polygon points="22 2 15 22 11 13 2 9 22 2"/>
				</svg>
			</button>
		</div>
	</div>

</div>

<script>
	// ── CONFIG ──────────────────────────────────────────────────────────────────
	const WEBHOOK_URL = 'https://n8n.srv1178999.hstgr.cloud/webhook/680058b4-c36b-491f-b676-ebaeddbf7026/chat';
	const HISTORY_KEY = 'iceboy_chat_history';

	// ── STATE ───────────────────────────────────────────────────────────────────
	let sessionId = localStorage.getItem('iceboy_session') || generateId();
	localStorage.setItem('iceboy_session', sessionId);
	let isTyping = false;

	// ── DOM ─────────────────────────────────────────────────────────────────────
	const body = document.getElementById('chat-body');
	const textarea = document.getElementById('chat-textarea');
	const sendBtn = document.getElementById('btn-send');

	// Send on Enter
	textarea.addEventListener('keydown', e => {
		if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
	});
	sendBtn.addEventListener('click', sendMessage);

	// Auto-grow textarea
	textarea.addEventListener('input', () => {
		textarea.style.height = 'auto';
		textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
	});

	// ── SESSION: Save & Load ─────────────────────────────────────────────────────
	function saveMessage(role, text) {
		try {
			var h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
			h.push({ role: role, text: text });
			localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
		} catch (e) {}
	}
	function loadHistory() {
		try {
			var h = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
			if (!h.length) return false;
			h.forEach(function (m) { addMessage(m.role, m.text, true); });
			return true;
		} catch (e) { return false; }
	}

	// Welcome messages
	function showWelcome() {
		const msgs = [
			'Hello! Welcome to Ice-boy India 🧊',
			'How can I help you today? You can ask about our ice machines, pricing, service support, or technical specifications.'
		];
		msgs.forEach((txt, i) => {
			setTimeout(() => addMessage('bot', txt), i * 600);
		});
	}

	// Add message
	function addMessage(role, text, skipSave) {
		const row = document.createElement('div');
		row.className = 'msg-row ' + role;

		let formattedText = text;
		if (role === 'bot') {
			const links = [];
			formattedText = formattedText.replace(
				/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
				(match, linkText, url) => {
					links.push({ text: linkText, url: url });
					return `###LINK${links.length - 1}###`;
				}
			);
			formattedText = escapeHtml(formattedText);
			links.forEach((link, index) => {
				const safeUrl = link.url.replace(/"/g, '&quot;');
				formattedText = formattedText.replace(
					`###LINK${index}###`,
					`<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.text)}</a>`
				);
			});
		} else {
			formattedText = escapeHtml(formattedText);
		}

		if (role === 'bot') {
			row.innerHTML = `
				<div class="msg-avatar">
					<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="12" y1="2" x2="12" y2="22"/>
						<line x1="2" y1="12" x2="22" y2="12"/>
						<line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
						<line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/>
						<line x1="12" y1="2" x2="9" y2="5"/><line x1="12" y1="2" x2="15" y2="5"/>
						<line x1="12" y1="22" x2="9" y2="19"/><line x1="12" y1="22" x2="15" y2="19"/>
						<line x1="2" y1="12" x2="5" y2="9"/><line x1="2" y1="12" x2="5" y2="15"/>
						<line x1="22" y1="12" x2="19" y2="9"/><line x1="22" y1="12" x2="19" y2="15"/>
					</svg>
				</div>
				<div class="msg-col">
					<div class="bubble">${formattedText}</div>
				</div>`;
		} else {
			row.innerHTML = `
				<div class="msg-col">
					<div class="bubble">${formattedText}</div>
				</div>`;
		}
		body.appendChild(row);
		scrollBottom();
		if (!skipSave) saveMessage(role, text);
	}

	// Typing indicator
	function showTyping() {
		const row = document.createElement('div');
		row.className = 'msg-row bot';
		row.id = 'typing-row';
		row.innerHTML = `
			<div class="msg-avatar">
				<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<line x1="12" y1="2" x2="12" y2="22"/>
					<line x1="2" y1="12" x2="22" y2="12"/>
					<line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
					<line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/>
					<line x1="12" y1="2" x2="9" y2="5"/><line x1="12" y1="2" x2="15" y2="5"/>
					<line x1="12" y1="22" x2="9" y2="19"/><line x1="12" y1="22" x2="15" y2="19"/>
					<line x1="2" y1="12" x2="5" y2="9"/><line x1="2" y1="12" x2="5" y2="15"/>
					<line x1="22" y1="12" x2="19" y2="9"/><line x1="22" y1="12" x2="19" y2="15"/>
				</svg>
			</div>
			<div class="typing-bubble">
				<div class="typing-dot"></div>
				<div class="typing-dot"></div>
				<div class="typing-dot"></div>
			</div>`;
		body.appendChild(row);
		scrollBottom();
	}
	function hideTyping() {
		const t = document.getElementById('typing-row');
		if (t) t.remove();
	}

	// Send message
	async function sendMessage() {
		const text = textarea.value.trim();
		if (!text || isTyping) return;

		addMessage('user', text);
		textarea.value = '';
		textarea.style.height = 'auto';
		sendBtn.disabled = true;
		isTyping = true;
		showTyping();

		try {
			const res = await fetch(WEBHOOK_URL, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
				body: JSON.stringify({ chatInput: text, sessionId: sessionId })
			});
			if (!res.ok) throw new Error('HTTP ' + res.status);
			const data = await res.json();
			hideTyping();

			let reply = '';
			if (typeof data === 'string') {
				reply = data;
			} else if (Array.isArray(data)) {
				reply = data[0]?.output || data[0]?.text || data[0]?.message || JSON.stringify(data[0]);
			} else {
				reply = data?.output || data?.text || data?.message
					|| data?.reply || data?.response || data?.answer
					|| (data?.data && (data.data?.output || data.data?.text))
					|| JSON.stringify(data);
			}
			addMessage('bot', reply || 'Message received!');

		} catch (err) {
			hideTyping();
			console.error('Chat error:', err);
			addMessage('bot', 'Sorry, I could not reach the server. Please try again.');
		} finally {
			sendBtn.disabled = false;
			isTyping = false;
		}
	}

	// Helpers
	function scrollBottom() {
		requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
	}
	function generateId() {
		return 'sess_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36);
	}
	function escapeHtml(s) {
		return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
	}

	// Boot
	if (!loadHistory()) showWelcome();
</script>
</body>
</html>
